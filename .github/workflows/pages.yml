name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build public static artifact
        run: |
          rm -rf .pages
          mkdir -p .pages/_assets

          cp index.html ai.html investment.html .pages/
          cp README.md PROJECT_BACKGROUND.md DIRECTORY_STRUCTURE.md AGENTS.md ITERATION_LOG.md .pages/
          cp .nojekyll .pages/.nojekyll
          cp _assets/*.css .pages/_assets/

          if [ -d "topics" ]; then
            cp -R topics .pages/topics
          fi

          if [ -d "wiki" ]; then
            cp -R wiki .pages/wiki
          fi

          find .pages -name "__pycache__" -type d -prune -exec rm -rf {} +
          find .pages -name "*.pyc" -type f -delete
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
